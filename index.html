<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> JEANS CLUB -  Humor Notifications</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        
        input:focus {
            outline: none;
            border-color: #000;
        }
        
        button {
            background: #000;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            background: #333;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> JEANS CLUB</h1>
        <div class="subtitle"> Notifications</div>
        
        <div class="input-group">
            <label>📱 Your Phone Number</label>
            <input type="tel" id="phoneNumber" placeholder="+256 772 558 913">
        </div>
        
        <button onclick="subscribeToDarkHumor()">
            🔔 Subscribe to Notifications
        </button>
        
        <div id="status" class="status"></div>
        
        <div class="footer">
            You'll receive notifications at 9 AM & 7 PM daily.<br>
            
        </div>
    </div>
    <script>
        const WORKER_URL = 'https://jeansclub-gist-api.amanyakeith418.workers.dev';
        
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "d7c1ea6e-ba97-4e58-8660-178510f826f5",
            });
        });
        
        async function subscribeToDarkHumor() {
            const phone = document.getElementById('phoneNumber').value.trim();
            const statusDiv = document.getElementById('status');
            
            if (!phone) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Please enter your phone number';
                return;
            }
            
            let formattedPhone = phone;
            if (phone.startsWith('0')) {
                formattedPhone = '+256' + phone.substring(1);
            } else if (!phone.startsWith('+')) {
                formattedPhone = '+256' + phone;
            }
            
            statusDiv.className = 'status';
            statusDiv.innerHTML = '📡 Please ALLOW notifications when prompted...';
            
            try {
                // Request permission - this shows the browser popup
                const result = await OneSignal.Notifications.requestPermission();
                
                if (result) {
                    // User clicked ALLOW
                    await OneSignal.login(formattedPhone);
                    
                    // Save to Gist
                    await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: formattedPhone })
                    });
                    
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = '✅ Subscribed! You will receive JEANS CLUB  NOTIFICATIONS at 9 AM and 7 PM daily. 🖤';
                    document.getElementById('phoneNumber').value = '';
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ You must click ALLOW to receive notifications. Please refresh and try again.';
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
