<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEANS CLUB - Notifications</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: url('https://images.unsplash.com/photo-1582418702059-97ebafb35d09?q=80&w=2070&auto=format') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,215,0,0.3);
        }
        .header-logo { height: 60px; display: block; margin: 0 auto 15px; }
        .tagline { text-align: center; color: #FFD700; font-size: 12px; margin-bottom: 25px; }
        input, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 12px;
            background: rgba(255,255,255,0.9);
        }
        button {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
        }
        .status.success { background: rgba(40, 167, 69, 0.85); color: white; display: block; }
        .status.error { background: rgba(220, 53, 69, 0.85); color: white; display: block; }
        .admin-panel { display: none; }
        .admin-panel.show { display: block; }
        .badge-active { background: rgba(40, 167, 69, 0.8); padding: 3px 8px; border-radius: 12px; font-size: 10px; }
        .badge-inactive { background: rgba(220, 53, 69, 0.8); padding: 3px 8px; border-radius: 12px; font-size: 10px; }
        .subscriber-item {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .stats-grid { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; flex: 1; text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; color: #FFD700; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="https://i.ibb.co/rKnKMscG/67556a31-02c7-4182-a1d8-c12667bd7136.jpg" class="header-logo">
            <div class="tagline">RAISED ON DENIM</div>
            
            <input type="tel" id="phoneNumber" placeholder="+256 772 558 913">
            <button onclick="subscribeToDarkHumor()">🔔 Subscribe to Notifications</button>
            <div id="status" class="status"></div>
        </div>
        
        <div class="card">
            <button onclick="showAdminLogin()" style="background: linear-gradient(135deg, #333 0%, #555 100%);">🔐 Admin Login</button>
        </div>
        
        <div id="adminPanel" class="admin-panel">
            <div class="card">
                <h3 style="color:#FFD700;">👑 ADMIN CONTROL</h3>
                <input type="text" id="adminTitle" placeholder="Title">
                <textarea id="adminMessage" placeholder="Message" rows="3"></textarea>
                <button onclick="sendCustomNotification()">📤 Send to All Subscribers</button>
                <div id="adminResult" class="status"></div>
            </div>
            
            <div class="card">
                <h3 style="color:#FFD700;">📊 SUBSCRIBER STATISTICS</h3>
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-number" id="totalGistCount">0</div><div>Total</div></div>
                    <div class="stat-box"><div class="stat-number" id="totalOneSignalCount">0</div><div>Active</div></div>
                </div>
                <button onclick="loadSubscribers()">🔄 Refresh</button>
                <div id="subscribersList" style="margin-top: 15px; max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://jeansclub-gist-api.amanyakeith418.workers.dev';
        const ADMIN_PASSWORD = 'JEANSCLUB2024';
        
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "d7c1ea6e-ba97-4e58-8660-178510f826f5",
                safari_web_id: "web.onesignal.auto.12345",
                allowLocalhostAsSecureOrigin: true,
            });
            console.log('OneSignal initialized');
        });
        
        async function subscribeToDarkHumor() {
            const phone = document.getElementById('phoneNumber').value.trim();
            const statusDiv = document.getElementById('status');
            
            if (!phone) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Please enter your phone number';
                return;
            }
            
            let formattedPhone = phone;
            if (phone.startsWith('0')) {
                formattedPhone = '+256' + phone.substring(1);
            } else if (!phone.startsWith('+')) {
                formattedPhone = '+256' + phone;
            }
            
            statusDiv.className = 'status';
            statusDiv.innerHTML = '🔔 Requesting permission...';
            
            try {
                const OneSignal = window.OneSignal;
                
                // Request permission
                const permissionGranted = await OneSignal.Notifications.requestPermission();
                
                if (!permissionGranted) {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ You must click ALLOW to receive notifications';
                    return;
                }
                
                statusDiv.innerHTML = '📝 Registering...';
                
                // Set external user ID
                await OneSignal.login(formattedPhone);
                
                // Wait for registration
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // Get the subscription ID directly from the SDK
                let playerId = null;
                
                // Try to get from the internal subscription
                if (OneSignal.User && OneSignal.User.pushSubscription) {
                    const sub = OneSignal.User.pushSubscription;
                    playerId = sub.id || await sub.getId();
                }
                
                // If still no ID, use a fallback
                if (!playerId) {
                    playerId = 'pending_' + Date.now();
                }
                
                console.log('Player ID:', playerId);
                
                // Save to worker
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: formattedPhone,
                        player_id: playerId,
                        subscribed_at: new Date().toISOString()
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = '✅ Subscribed! You will receive notifications. 🖤';
                    document.getElementById('phoneNumber').value = '';
                } else {
                    throw new Error(result.error);
                }
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Error: ' + error.message;
            }
        }
        
        function showAdminLogin() {
            const password = prompt('Enter Admin Password:');
            if (password === ADMIN_PASSWORD) {
                document.getElementById('adminPanel').classList.add('show');
                loadSubscribers();
            } else if (password !== null) {
                alert('Wrong password!');
            }
        }
        
        async function loadSubscribers() {
            const subscribersDiv = document.getElementById('subscribersList');
            subscribersDiv.innerHTML = 'Loading...';
            
            try {
                const response = await fetch(`${WORKER_URL}/subscribers`);
                const data = await response.json();
                
                document.getElementById('totalGistCount').textContent = data.total || 0;
                document.getElementById('totalOneSignalCount').textContent = data.valid || 0;
                
                if (data.total === 0) {
                    subscribersDiv.innerHTML = 'No subscribers yet.';
                } else {
                    subscribersDiv.innerHTML = data.subscribers.map(c => `
                        <div class="subscriber-item">
                            <div>
                                <div class="subscriber-phone">${c.phone}</div>
                                <div class="subscriber-date">
                                    ${c.player_id && !c.player_id.startsWith('pending_') ? '<span class="badge-active">✅ Active</span>' : '<span class="badge-inactive">❌ Inactive</span>'}<br>
                                    Subscribed: ${new Date(c.subscribed_at).toLocaleString()}
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                subscribersDiv.innerHTML = 'Error loading subscribers.';
            }
        }
        
        async function sendCustomNotification() {
            const title = document.getElementById('adminTitle').value.trim();
            const message = document.getElementById('adminMessage').value.trim();
            const resultDiv = document.getElementById('adminResult');
            
            if (!title || !message) {
                resultDiv.className = 'status error';
                resultDiv.innerHTML = '❌ Please enter both title and message';
                return;
            }
            
            resultDiv.className = 'status';
            resultDiv.innerHTML = '📡 Sending...';
            
            try {
                const response = await fetch(`${WORKER_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, message })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.className = 'status success';
                    resultDiv.innerHTML = `✅ Sent to ${result.sent_to} subscribers!`;
                    document.getElementById('adminTitle').value = '';
                    document.getElementById('adminMessage').value = '';
                    loadSubscribers();
                } else {
                    resultDiv.className = 'status error';
                    resultDiv.innerHTML = `❌ Failed: ${result.error}`;
                }
            } catch (error) {
                resultDiv.className = 'status error';
                resultDiv.innerHTML = '❌ Error sending notification.';
            }
        }
    </script>
</body>
</html>
