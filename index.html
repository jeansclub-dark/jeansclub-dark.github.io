<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEANS CLUB - Notifications</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: url('https://images.unsplash.com/photo-1582418702059-97ebafb35d09?q=80&w=2070&auto=format') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,215,0,0.3);
        }
        input, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 12px;
            background: rgba(255,255,255,0.9);
        }
        button {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            font-size: 14px;
        }
        .status.success { background: rgba(40, 167, 69, 0.85); color: white; display: block; }
        .status.error { background: rgba(220, 53, 69, 0.85); color: white; display: block; }
        .status.info { background: rgba(0, 123, 255, 0.85); color: white; display: block; }
        .admin-panel { display: none; }
        .admin-panel.show { display: block; }
        .debug-console {
            background: #1e1e1e;
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 11px;
            max-height: 200px;
            overflow-y: auto;
        }
        .debug-line { margin: 3px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 style="color:#FFD700; text-align:center;">JEANS CLUB</h2>
            <p style="color:white; text-align:center; margin-bottom:20px;">RAISED ON DENIM</p>
            
            <input type="tel" id="phoneNumber" placeholder="+256 772 558 913">
            <button onclick="subscribeToDarkHumor()">🔔 Subscribe to Notifications</button>
            <div id="status" class="status"></div>
            
            <!-- Debug Console -->
            <div class="debug-console" id="debugConsole">
                <div class="debug-line">📡 Waiting for actions...</div>
            </div>
        </div>
        
        <div class="card">
            <button onclick="showAdminLogin()" style="background: linear-gradient(135deg, #333 0%, #555 100%);">🔐 Admin Login</button>
        </div>
        
        <div id="adminPanel" class="admin-panel">
            <div class="card">
                <h3 style="color:#FFD700;">👑 ADMIN CONTROL</h3>
                <input type="text" id="adminTitle" placeholder="Title">
                <textarea id="adminMessage" placeholder="Message" rows="3"></textarea>
                <button onclick="sendCustomNotification()">📤 Send to All Subscribers</button>
                <div id="adminResult" class="status"></div>
            </div>
            
            <div class="card">
                <h3 style="color:#FFD700;">📊 SUBSCRIBER STATISTICS</h3>
                <div id="subscribersList" style="margin-top: 15px;"></div>
                <button onclick="loadSubscribers()" style="margin-top:10px;">🔄 Refresh</button>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://jeansclub-gist-api.amanyakeith418.workers.dev';
        const ADMIN_PASSWORD = 'JEANSCLUB2024';
        
        function addDebugLog(message, type = 'info') {
            const debugDiv = document.getElementById('debugConsole');
            const time = new Date().toLocaleTimeString();
            const colors = { info: '#0f0', error: '#f00', success: '#0f0' };
            debugDiv.innerHTML += `<div class="debug-line" style="color:${colors[type] || '#0f0'};">[${time}] ${message}</div>`;
            debugDiv.scrollTop = debugDiv.scrollHeight;
            console.log(message);
        }
        
        // Initialize OneSignal with proper config
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            addDebugLog('🔧 Initializing OneSignal...');
            
            try {
                await OneSignal.init({
                    appId: "d7c1ea6e-ba97-4e58-8660-178510f826f5",
                    safari_web_id: "web.onesignal.auto.12345",
                    allowLocalhostAsSecureOrigin: true,
                });
                addDebugLog('✅ OneSignal initialized successfully', 'success');
                
                // Check notification permission
                const permission = await OneSignal.Notifications.permission;
                addDebugLog(`📊 Current notification permission: ${permission}`);
                
            } catch (error) {
                addDebugLog(`❌ OneSignal init failed: ${error.message}`, 'error');
            }
        });
        
        async function subscribeToDarkHumor() {
            const phone = document.getElementById('phoneNumber').value.trim();
            const statusDiv = document.getElementById('status');
            
            if (!phone) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Please enter your phone number';
                return;
            }
            
            let formattedPhone = phone;
            if (phone.startsWith('0')) {
                formattedPhone = '+256' + phone.substring(1);
            } else if (!phone.startsWith('+')) {
                formattedPhone = '+256' + phone;
            }
            
            addDebugLog(`📱 Starting subscription for: ${formattedPhone}`);
            statusDiv.className = 'status';
            statusDiv.innerHTML = '🔔 Requesting permission...';
            
            try {
                const OneSignal = window.OneSignal;
                
                if (!OneSignal) {
                    throw new Error('OneSignal not loaded');
                }
                
                // Step 1: Check if already subscribed
                const isSubscribed = await OneSignal.Notifications.isSubscribed();
                addDebugLog(`📊 Already subscribed: ${isSubscribed}`);
                
                // Step 2: Request permission
                addDebugLog('🔔 Requesting notification permission...');
                const permissionGranted = await OneSignal.Notifications.requestPermission();
                
                if (!permissionGranted) {
                    addDebugLog('❌ User denied permission', 'error');
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ You must click ALLOW to receive notifications';
                    return;
                }
                
                addDebugLog('✅ Permission granted', 'success');
                statusDiv.innerHTML = '📝 Registering your device...';
                
                // Step 3: Set external user ID
                addDebugLog(`🔑 Setting external user ID: ${formattedPhone}`);
                await OneSignal.login(formattedPhone);
                
                // Step 4: Wait for registration
                await new Promise(resolve => setTimeout(resolve, 3000));
                
                // Step 5: Get the actual subscription
                let realPlayerId = null;
                let subscription = null;
                
                // Try multiple methods to get subscription info
                addDebugLog('🔍 Attempting to get subscription details...');
                
                // Method 1: Get push subscription
                if (OneSignal.User && OneSignal.User.pushSubscription) {
                    subscription = OneSignal.User.pushSubscription;
                    realPlayerId = subscription.id;
                    addDebugLog(`📌 Method 1 - Subscription ID: ${realPlayerId || 'null'}`);
                }
                
                // Method 2: Check if actually subscribed
                const finalSubscriptionStatus = await OneSignal.Notifications.isSubscribed();
                addDebugLog(`📊 Final subscription status: ${finalSubscriptionStatus}`);
                
                if (!finalSubscriptionStatus) {
                    throw new Error('Not actually subscribed to OneSignal');
                }
                
                if (!realPlayerId) {
                    addDebugLog('⚠️ Could not get player ID, but subscription exists', 'error');
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ Partial subscription. Please refresh and try again, or use Google Chrome browser.';
                    return;
                }
                
                addDebugLog(`✅ Got REAL player ID: ${realPlayerId}`, 'success');
                
                // Step 6: Save to Gist
                addDebugLog('💾 Saving to Gist...');
                statusDiv.innerHTML = '💾 Saving subscription...';
                
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: formattedPhone,
                        player_id: realPlayerId,
                        subscribed_at: new Date().toISOString()
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    addDebugLog('✅ Successfully saved to Gist!', 'success');
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = '✅ Subscribed! You will receive JEANS CLUB notifications. 🖤';
                    document.getElementById('phoneNumber').value = '';
                } else {
                    throw new Error(result.error || 'Failed to save');
                }
                
            } catch (error) {
                addDebugLog(`❌ Error: ${error.message}`, 'error');
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ Error: ${error.message}<br><br>💡 Please use Google Chrome browser and ensure notifications are enabled.`;
            }
        }
        
        function showAdminLogin() {
            const password = prompt('Enter Admin Password:');
            if (password === ADMIN_PASSWORD) {
                document.getElementById('adminPanel').classList.add('show');
                loadSubscribers();
            } else if (password !== null) {
                alert('Wrong password!');
            }
        }
        
        async function loadSubscribers() {
            const subscribersDiv = document.getElementById('subscribersList');
            subscribersDiv.innerHTML = 'Loading...';
            
            try {
                const response = await fetch(`${WORKER_URL}/subscribers`);
                const data = await response.json();
                
                if (data.total === 0) {
                    subscribersDiv.innerHTML = 'No subscribers yet.';
                } else {
                    let html = `<div class="stats-grid" style="display:flex; gap:10px; margin-bottom:15px;">
                        <div class="stat-box" style="background:rgba(255,255,255,0.1); padding:10px; border-radius:8px; flex:1; text-align:center;">
                            <div style="font-size:24px; color:#FFD700;">${data.total}</div>
                            <div style="font-size:11px;">Total</div>
                        </div>
                        <div class="stat-box" style="background:rgba(255,255,255,0.1); padding:10px; border-radius:8px; flex:1; text-align:center;">
                            <div style="font-size:24px; color:#FFD700;">${data.valid}</div>
                            <div style="font-size:11px;">Active</div>
                        </div>
                    </div>`;
                    
                    html += '<div style="max-height:300px; overflow-y:auto;">';
                    data.subscribers.forEach(c => {
                        const isValid = c.player_id && !c.player_id.includes('pending') && !c.player_id.includes('temp');
                        html += `
                            <div style="background:rgba(255,255,255,0.1); padding:10px; border-radius:8px; margin-bottom:8px;">
                                <div style="font-weight:bold; color:#FFD700;">${c.phone}</div>
                                <div style="font-size:10px;">${isValid ? '✅ Active' : '❌ Inactive'}</div>
                                <div style="font-size:9px; color:rgba(255,255,255,0.5);">${new Date(c.subscribed_at).toLocaleString()}</div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    subscribersDiv.innerHTML = html;
                }
            } catch (error) {
                subscribersDiv.innerHTML = 'Error loading subscribers.';
            }
        }
        
        async function sendCustomNotification() {
            const title = document.getElementById('adminTitle').value.trim();
            const message = document.getElementById('adminMessage').value.trim();
            const resultDiv = document.getElementById('adminResult');
            
            if (!title || !message) {
                resultDiv.className = 'status error';
                resultDiv.innerHTML = '❌ Please enter both title and message';
                return;
            }
            
            resultDiv.className = 'status';
            resultDiv.innerHTML = '📡 Sending notification...';
            
            try {
                const response = await fetch(`${WORKER_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, message })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.className = 'status success';
                    resultDiv.innerHTML = `✅ Notification sent to ${result.sent_to} subscriber(s)!`;
                    document.getElementById('adminTitle').value = '';
                    document.getElementById('adminMessage').value = '';
                    loadSubscribers();
                } else {
                    resultDiv.className = 'status error';
                    resultDiv.innerHTML = `❌ Failed: ${result.error}<br>💡 ${result.suggestion || 'No active subscribers'}`;
                }
            } catch (error) {
                resultDiv.className = 'status error';
                resultDiv.innerHTML = '❌ Error sending notification.';
            }
        }
    </script>
</body>
</html>
