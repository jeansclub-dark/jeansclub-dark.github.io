name: JEANS CLUB Notifications

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send Notifications
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          # Use the RAW Gist URL (no authentication needed if public)
          RAW_URL="https://gist.githubusercontent.com/jeansclub-dark/93ac7bb3d2494ca189af7c8eb18a09ab/raw/jeansclub-customers.json"
          
          echo "Fetching from: $RAW_URL"
          
          # Fetch the raw content
          CONTENT=$(curl -s "$RAW_URL")
          
          if [ -z "$CONTENT" ]; then
            echo "❌ Failed to fetch Gist content"
            exit 1
          fi
          
          # Extract phone numbers
          PHONES=$(echo "$CONTENT" | jq -r '.customers[].phone' | jq -R -s -c 'split("\n")[:-1]')
          COUNT=$(echo "$PHONES" | jq 'length')
          
          echo "Found $COUNT customers"
          echo "Phones: $PHONES"
          
          if [ "$COUNT" -eq 0 ]; then
            echo "No customers to notify"
            exit 0
          fi
          
          # Send notification
          HOUR=$(date +%H)
          if [ "$HOUR" -eq 9 ]; then
            MSG="🌅 JEANS CLUB: Good morning! Your favorite jeans are still the same price. Yes, we saw you checking. No, they won't get cheaper. Stop asking."
          else
            MSG="🌙 JEANS CLUB: Evening! You tried to bargain for 5k. You lost the jeans. Your negotiation skills cost you. Priceless."
          fi
          
          RESPONSE=$(curl -s -X POST https://onesignal.com/api/v1/notifications \
            -H "Authorization: Basic $ONESIGNAL_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"app_id\": \"$ONESIGNAL_APP_ID\",
              \"headings\": {\"en\": \"🖤 JEANS CLUB\"},
              \"contents\": {\"en\": \"$MSG\"},
              \"include_external_user_ids\": $PHONES
            }")
          
          echo "OneSignal response: $RESPONSE"
          
          if echo "$RESPONSE" | jq -e '.id' > /dev/null 2>&1; then
            echo "✅ Notification sent to $COUNT customers"
          else
            echo "❌ Failed to send"
            exit 1
          fi
