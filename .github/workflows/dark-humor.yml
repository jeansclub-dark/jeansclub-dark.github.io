name: JEANS CLUB Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug Gist Access
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "=== TEST 1: Check if token works ==="
          RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/gists/$GIST_ID")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Token failed! HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "✅ Token works!"
          
          echo ""
          echo "=== TEST 2: Check Gist content ==="
          echo "$BODY" | jq '.files | keys'
          
          echo ""
          echo "=== TEST 3: Extract customers ==="
          CONTENT=$(echo "$BODY" | jq -r '.files["jeansclub-customers.json"].content')
          echo "Raw content: $CONTENT"
          
          echo ""
          echo "=== TEST 4: Count customers ==="
          echo "$CONTENT" | jq '.customers | length'
          
          echo ""
          echo "=== TEST 5: List phones ==="
          echo "$CONTENT" | jq -r '.customers[].phone'
          
          echo ""
          echo "=== TEST 6: Create JSON array ==="
          PHONES=$(echo "$CONTENT" | jq -r '.customers[].phone' | jq -R -s -c 'split("\n")[:-1]')
          echo "Phones array: $PHONES"
          
          COUNT=$(echo "$PHONES" | jq 'length')
          echo "Count: $COUNT"
