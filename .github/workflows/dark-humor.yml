name: JEANS CLUB Notifications

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send Notifications
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          # Fetch Gist
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/gists/$GIST_ID")
          
          # Extract phones
          PHONES=$(echo "$RESPONSE" | jq -r '.files["jeansclub-customers.json"].content' | jq -r '.customers[].phone' 2>/dev/null | jq -R -s -c 'split("\n")[:-1]')
          
          COUNT=$(echo "$PHONES" | jq 'length' 2>/dev/null || echo "0")
          
          echo "Found $COUNT customers"
          
          if [ "$COUNT" -eq 0 ]; then
            echo "No customers"
            exit 0
          fi
          
          # Send notification
          HOUR=$(date +%H)
          if [ "$HOUR" -eq 9 ]; then
            MSG="🌅 JEANS CLUB: Good morning! Your favorite jeans are still the same price. Yes, we saw you checking. No, they won't get cheaper. Stop asking."
          else
            MSG="🌙 JEANS CLUB: Evening! You tried to bargain for 5k. You lost the jeans. Your negotiation skills cost you. Priceless."
          fi
          
          curl -X POST https://onesignal.com/api/v1/notifications \
            -H "Authorization: Basic $ONESIGNAL_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"app_id\": \"$ONESIGNAL_APP_ID\",
              \"headings\": {\"en\": \"🖤 JEANS CLUB\"},
              \"contents\": {\"en\": \"$MSG\"},
              \"include_external_user_ids\": $PHONES
            }"
          
          echo "Sent to $COUNT customers"
